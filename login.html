<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Login | MJC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-color);
        }
        .login-box {
            background: var(--surface-color);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .login-logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 2rem;
            display: inline-block;
        }
        .login-logo span { color: var(--text-main); }
        .error-msg {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="login-logo"><img src="Image.jpg" alt="MJC Logo" class="brand-logo"> MJC<span>.</span></div>
        <h2 style="margin-bottom: 1.5rem; font-size: 1.2rem;">Admin Portal</h2>
        
        <div id="error-msg" class="error-msg"></div>

        <form id="login-form">
            <div class="form-group">
                <input type="email" id="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
        
        <div style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-light);">
            <a href="index.html" style="text-decoration: underline;">&larr; Back to Website</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = e.target.querySelector('button');
            
            btn.innerText = 'Signing in...';
            btn.disabled = true;

            try {
                const { data, error } = await db.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;
                
                // Success
                window.location.href = 'admin/index.html';
                
            } catch (error) {
                errorMsg.innerText = error.message || 'Invalid credentials';
                errorMsg.style.display = 'block';
                btn.innerText = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
