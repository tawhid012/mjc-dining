<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offers & Deals | Mariam Juice Cafe & Dining</title>
    <meta name="description" content="Check out the latest exclusive offers, deals and coupon codes at Mariam Juice Cafe & Dining, Hailakandi.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .offers-hero {
            padding: 120px 0 50px;
            text-align: center;
        }

        /* ── Offer Cards Grid ── */
        .offers-grid {
            max-width: 860px;
            margin: 0 auto 5rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.8rem;
            padding: 0 1rem;
        }

        @media (min-width: 640px) {
            .offers-grid { grid-template-columns: 1fr 1fr; }
        }

        /* ── Individual Offer Card ── */
        .offer-card {
            border-radius: 22px;
            padding: 2rem 2rem 1.75rem;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.14);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 1.2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: linear-gradient(135deg, #A68A64, #7a6348);
        }

        .offer-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.22);
        }

        /* Decorative circles */
        .offer-card::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 130px; height: 130px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .offer-card::after {
            content: '';
            position: absolute;
            bottom: -60px; left: -20px;
            width: 160px; height: 160px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }

        .offer-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.28);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.74rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: fit-content;
        }

        .offer-title {
            font-size: 1.55rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.25;
            text-shadow: 0 1px 3px rgba(0,0,0,0.15);
        }

        .offer-desc {
            font-size: 0.9rem;
            opacity: 0.88;
            margin: 0;
            line-height: 1.6;
        }

        .offer-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .offer-code {
            background: rgba(0,0,0,0.22);
            padding: 7px 16px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            border: 1.5px dashed rgba(255,255,255,0.5);
            cursor: pointer;
            transition: background 0.2s;
            user-select: all;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .offer-code:hover { background: rgba(0,0,0,0.35); }
        .offer-code .copy-hint { font-size: 0.7rem; opacity: 0.7; font-family: 'Poppins', sans-serif; font-weight: 400; letter-spacing: 0; }

        .offer-cta {
            background: rgba(255,255,255,0.22);
            border: 2px solid rgba(255,255,255,0.6);
            color: white;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .offer-cta:hover { background: rgba(255,255,255,0.35); }

        /* ── Skeleton loader ── */
        .skeleton-card {
            border-radius: 22px;
            height: 180px;
            background: linear-gradient(90deg, #e8e8e8 25%, #f5f5f5 50%, #e8e8e8 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Empty state ── */
        .offers-empty {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light, #777);
            grid-column: 1 / -1;
        }
        .offers-empty i { font-size: 3rem; opacity: 0.25; margin-bottom: 1rem; display: block; }

        /* ── Copy toast ── */
        #copy-toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #1a1a1a;
            color: white;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 999;
            pointer-events: none;
            white-space: nowrap;
        }
        #copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <!-- Copy Toast -->
    <div id="copy-toast"><i class="fa-solid fa-check" style="margin-right:6px;"></i> Code copied!</div>

    <header class="header">
        <div class="container">
            <a href="index.html" class="logo"><img src="Image.jpg" alt="MJC Logo" class="brand-logo"> MJC<span>.</span></a>
            <nav class="desktop-nav">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="offers.html" style="color: var(--primary-color);">Offers</a>
                <a href="booking.html">Book Table</a>
                <button class="btn btn-primary" onclick="toggleCart()"><i class="fa-solid fa-bag-shopping"></i> Cart (<span id="cart-count-nav">0</span>)</button>
            </nav>
            <button class="mobile-menu-btn" aria-label="Menu" onclick="toggleMobileMenu()"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <main>
        <section class="offers-hero">
            <h1 class="section-title">Exclusive Offers</h1>
            <p class="section-subtitle">Special deals crafted just for you — tap a code to copy it!</p>
        </section>

        <section class="offers-grid" id="offers-grid">
            <!-- Skeletons shown while loading -->
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house nav-icon"></i><span class="nav-label">Home</span></a>
        <a href="menu.html" class="nav-item"><i class="fa-solid fa-utensils nav-icon"></i><span class="nav-label">Menu</span></a>
        <a href="offers.html" class="nav-item active"><i class="fa-solid fa-tag nav-icon"></i><span class="nav-label">Offers</span></a>
        <a href="#" class="nav-item" onclick="toggleCart(); return false;"><i class="fa-solid fa-bag-shopping nav-icon"></i><span class="nav-label">Cart</span></a>
    </nav>

    <!-- Cart Overlay & Drawer -->
    <div class="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h3>Your Order</h3>
            <button onclick="toggleCart()" style="font-size: 1.2rem; color: var(--text-light);"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-items" id="cart-items-container"></div>
        <div class="cart-footer">
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <input type="text" id="cart-name" class="form-control" placeholder="Your Name *" required style="padding: 0.6rem 1rem; font-size: 0.9rem;">
            </div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <input type="text" id="cart-phone" class="form-control" placeholder="Contact Number *" required style="padding: 0.6rem 1rem; font-size: 0.9rem;">
            </div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <textarea id="cart-address" class="form-control" placeholder="Delivery Address *" required style="padding: 0.6rem 1rem; font-size: 0.9rem; min-height: 60px;"></textarea>
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
                <input type="text" id="cart-coupon" class="form-control" placeholder="Coupon Code (Optional)" style="padding: 0.6rem 1rem; font-size: 0.9rem; border: 1px dashed var(--primary-color);">
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; font-weight: 600; font-size: 1.1rem;">
                <span>Total:</span>
                <span id="cart-total-price">₹0</span>
            </div>
            <button class="btn btn-primary" style="width: 100%; border:none; cursor:pointer;" onclick="checkoutViaWhatsApp()">
                <i class="fa-brands fa-whatsapp" style="margin-right: 8px;"></i> Checkout via WhatsApp
            </button>
        </div>
    </div>

    <!-- Mobile Nav Drawer -->
    <div class="mobile-nav-drawer" id="mobile-nav-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <h2 style="font-size:1.5rem; color:var(--primary-color);">MJC.</h2>
            <button onclick="toggleMobileMenu()" style="font-size:1.5rem; color:var(--text-main);"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="offers.html">Offers</a>
        <a href="booking.html">Book Table</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js?v=3"></script>
    <script>
    // ── Colour palette cycling for cards ──
    const CARD_GRADIENTS = [
        'linear-gradient(135deg, #A68A64, #7a6348)',
        'linear-gradient(135deg, #2E7D32, #1B5E20)',
        'linear-gradient(135deg, #E67E22, #C0392B)',
        'linear-gradient(135deg, #1565C0, #0D47A1)',
        'linear-gradient(135deg, #6A1B9A, #4A148C)',
        'linear-gradient(135deg, #00838F, #006064)',
        'linear-gradient(135deg, #AD1457, #880E4F)',
    ];

    // ── Copy code to clipboard ──
    function copyCode(code) {
        navigator.clipboard.writeText(code).then(() => {
            const toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            // Also auto-fill the cart coupon field
            const couponInput = document.getElementById('cart-coupon');
            if (couponInput) couponInput.value = code;
            setTimeout(() => toast.classList.remove('show'), 2200);
        }).catch(() => {
            // fallback
            const el = document.createElement('textarea');
            el.value = code;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2200);
        });
    }

    // ── Render offers from DB ──
    function renderOffers(offers) {
        const grid = document.getElementById('offers-grid');
        if (!offers || offers.length === 0) {
            grid.innerHTML = `
                <div class="offers-empty">
                    <i class="fa-solid fa-tags"></i>
                    <h3>No Active Offers Right Now</h3>
                    <p>Check back soon — exciting deals are coming!</p>
                </div>`;
            return;
        }

        grid.innerHTML = offers.map((offer, i) => {
            const gradient = offer.bg_color
                ? `linear-gradient(135deg, ${offer.bg_color}, ${adjustColor(offer.bg_color)})`
                : CARD_GRADIENTS[i % CARD_GRADIENTS.length];

            const codeSection = offer.code
                ? `<div class="offer-code" onclick="copyCode('${offer.code}')" title="Click to copy">
                       <i class="fa-regular fa-copy" style="font-size:0.85rem;"></i>
                       ${offer.code}
                       <span class="copy-hint">tap to copy</span>
                   </div>`
                : `<a href="booking.html" class="offer-cta"><i class="fa-solid fa-arrow-right"></i> Book Now</a>`;

            return `
                <div class="offer-card" style="background: ${gradient};" data-aos>
                    <div>
                        <div class="offer-badge"><i class="fa-solid fa-bolt"></i> Limited Offer</div>
                        <h3 class="offer-title" style="margin-top:0.75rem;">${offer.title}</h3>
                        <p class="offer-desc">${offer.description || ''}</p>
                    </div>
                    <div class="offer-footer">
                        ${codeSection}
                        <a href="menu.html" class="offer-cta" style="font-size:0.8rem;">
                            <i class="fa-solid fa-utensils"></i> Order Now
                        </a>
                    </div>
                </div>`;
        }).join('');

        // Subtle entrance animation
        grid.querySelectorAll('.offer-card').forEach((card, i) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            setTimeout(() => {
                card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, i * 120);
        });
    }

    // Slightly darken a hex color for gradient end
    function adjustColor(hex) {
        try {
            const r = parseInt(hex.slice(1,3),16);
            const g = parseInt(hex.slice(3,5),16);
            const b = parseInt(hex.slice(5,7),16);
            const d = 40;
            return `rgb(${Math.max(0,r-d)},${Math.max(0,g-d)},${Math.max(0,b-d)})`;
        } catch(_) { return hex; }
    }

    // ── Load from Supabase ──
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const { data: offers, error } = await db
                .from('offers')
                .select('*')
                .eq('is_active', true)
                .order('id', { ascending: true });

            if (error) throw error;
            renderOffers(offers);
        } catch (err) {
            console.error('Failed to load offers:', err);
            document.getElementById('offers-grid').innerHTML = `
                <div class="offers-empty">
                    <i class="fa-solid fa-wifi" style="color:#e53935;"></i>
                    <h3>Could not load offers</h3>
                    <p>Please check your connection and try again.</p>
                </div>`;
        }
    });
    </script>
</body>
</html>
